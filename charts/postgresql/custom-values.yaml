auth:
  enablePostgresUser: true
  postgresPassword: "secretpassword"
  username: "sa"
  password: "Expertflow123"
  database: "licenseManager"
shmVolume:
  enabled: true
  sizeLimit: "1Gi"
tls:
  enabled: true
  autoGenerated: false
  preferServerCiphers: true
  certificatesSecret: "ef-postgresql-crt"
  certFilename: "tls.crt"
  certKeyFilename: "tls.key"
primary:
  initdb:
    scriptsConfigMap: "ef-postgresql-license-manager-cm"
  resources:
    limits: 
      memory: 1Gi
      cpu: 250m
    requests:
      memory: 256Mi
      cpu: 150m
  persistence:
    enabled: true
    size: 8Gi


