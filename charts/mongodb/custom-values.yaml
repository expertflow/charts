architecture: standalone
useStatefulSet: true
auth:
  enabled: true 
  rootUser: root
  rootPassword: "Expertflow123"
tls:
  enabled: true
  autoGenerated: true
  extraDnsNames:
       - "mongo-mongodb.ef-external.svc"
       - "mongo-mongodb.ef-external.svc.cluster.local"
  mode: requireTLS
extraFlags:
  - "--wiredTigerCacheSizeGB=0.5"
resources:
  limits:
     cpu: 500m
     memory: 4Gi
  requests:
     cpu: 200m
     memory: 1.5Gi
startupProbe:
  enabled: false
readinessProbe:
  enabled: false
livenessProbe:
  enabled: false
customLivenessProbe:
  tcpSocket:
    port: mongodb
  initialDelaySeconds: 5
  periodSeconds: 20
  timeoutSeconds: 10
  successThreshold: 1
  failureThreshold: 30
customReadinessProbe:
  tcpSocket:
    port: mongodb
  initialDelaySeconds: 5
  periodSeconds: 20
  timeoutSeconds: 10
  successThreshold: 1
  failureThreshold: 30
customStartupProbe: {}
persistence:
  enabled: true
  size: 8Gi
metrics:
  enabled: false
  serviceMonitor:
    enabled: false
  prometheusRule:
    enabled: false
